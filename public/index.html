<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Describe to Image</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .card h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .btn-download {
      background: #4caf50;
      color: white;
    }

    .btn-download:hover {
      background: #45a049;
    }

    .preview-section {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      min-height: 300px;
      border: 2px dashed #ddd;
      overflow-y: auto;
    }

    .templates-list {
      margin-top: 20px;
    }

    .templates-list h3 {
      color: #333;
      margin-bottom: 15px;
    }

    .template-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background: #f0f0f0;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      transition: all 0.3s;
    }

    .template-btn:hover {
      background: #e8e8e8;
      border-color: #667eea;
    }

    .template-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .full-width {
      grid-column: 1 / -1;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .status.loading {
      background: #cfe2ff;
      color: #084298;
      display: block;
    }

    @media (max-width: 768px) {
      .main-content {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎨 Describe to Image</h1>
      <p>Convert HTML descriptions to beautiful PNG images</p>
    </header>

    <div class="main-content">
      <div class="card">
        <h2>Templates</h2>
        <div class="templates-list" id="templatesList">
          <p style="color: #999;">Loading templates...</p>
        </div>
      </div>

      <div class="card">
        <h2>HTML Editor</h2>
        <textarea id="htmlInput" placeholder="Paste your HTML code here..."></textarea>
        <div class="button-group">
          <button class="btn-primary" onclick="previewHTML()">Preview</button>
          <button class="btn-download" onclick="downloadImage()">Download PNG</button>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="card full-width">
        <h2>Preview</h2>
        <div class="preview-section" id="preview">
          <p style="color: #999; text-align: center;">Preview will appear here</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
