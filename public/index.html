<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Describe to Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 32px 48px 24px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }

    header span {
      font-size: 0.8rem;
      color: #555;
    }

    /* FOLDER LIST VIEW */
    #list-view {
      padding: 40px 48px;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 16px;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 48px;
    }

    .folder-card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px 18px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .folder-card:hover {
      border-color: #444;
      background: #1c1c1c;
    }

    .folder-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .folder-name {
      font-size: 0.88rem;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .folder-tag {
      font-size: 0.65rem;
      color: #444;
      margin-top: 3px;
    }

    .empty-state {
      color: #383838;
      font-size: 0.85rem;
      padding: 12px 0;
    }

    /* DETAIL VIEW */
    #detail-view {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    .detail-header {
      padding: 20px 48px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .back-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #888;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      border-color: #555;
      color: #ccc;
    }

    .detail-title {
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      flex: 1;
    }

    .download-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .download-btn:hover { opacity: 0.85; }
    .download-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .download-btn.loading::after {
      content: '...';
    }

    #preview-frame {
      border: none;
      background: #fff;
      width: 100%;
      display: block;
    }

    .status-bar {
      padding: 8px 48px;
      font-size: 0.75rem;
      color: #555;
      border-top: 1px solid #1a1a1a;
      min-height: 32px;
    }

    .status-bar.error { color: #e05555; }
    .status-bar.success { color: #5ea85e; }
  </style>
</head>
<body>

  <!-- LIST VIEW -->
  <div id="list-view">
    <header>
      <h1>Describe to Image</h1>
      <span id="total-count"></span>
    </header>

    <div style="padding: 40px 48px;">
      <div class="section-label">Templates</div>
      <div class="folder-grid" id="templates-grid"></div>

      <div class="section-label">Generated</div>
      <div class="folder-grid" id="generated-grid"></div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <div class="detail-header">
      <button class="back-btn" onclick="showList()">Back</button>
      <div class="detail-title" id="detail-title"></div>
      <button class="download-btn" id="download-btn" onclick="downloadPng()">Download PNG</button>
    </div>
    <iframe id="preview-frame"></iframe>
    <div class="status-bar" id="status-bar"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
