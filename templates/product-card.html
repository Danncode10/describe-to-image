<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      width: 400px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    .image-placeholder {
      width: 100%;
      height: 250px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3em;
    }
    .content {
      padding: 30px;
    }
    .rating {
      color: #FFD700;
      font-size: 1.2em;
      margin-bottom: 10px;
    }
    h2 {
      font-size: 1.5em;
      color: #333;
      margin-bottom: 10px;
    }
    .price {
      font-size: 1.8em;
      color: #667eea;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .description {
      color: #666;
      font-size: 0.95em;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .button {
      width: 100%;
      padding: 12px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="image-placeholder">📔</div>
    <div class="content">
      <div class="rating">★★★★☆ 4.5/5</div>
      <h2>Premium Notebook</h2>
      <div class="price">$24.99</div>
      <div class="description">High-quality notebook perfect for journaling, sketching, and note-taking.</div>
      <button class="button">Add to Cart</button>
    </div>
  </div>
</body>
</html>
