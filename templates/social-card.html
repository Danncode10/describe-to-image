<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 800px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      width: 600px;
      padding: 60px;
      background: linear-gradient(135deg, #2196F3 0%, #9C27B0 100%);
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 3em;
      margin-bottom: 20px;
      font-weight: 700;
    }
    h2 {
      font-size: 1.8em;
      margin-bottom: 30px;
      opacity: 0.95;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Describe to Image</h1>
    <h2>Turn Ideas into Visuals</h2>
  </div>
</body>
</html>
